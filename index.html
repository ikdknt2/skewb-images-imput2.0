<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Skewb 座標取得ツール</title>
<style>
  body { font-family: sans-serif; }
  canvas { border:1px solid #000; cursor: crosshair; }
</style>
</head>
<body>
RGGROBYBBYOYRRBYBOOYGOGGRWWWWW
<canvas id="canvas"></canvas>

<p id="count">0 / 30</p>
<button onclick="resetPoints()">リセット</button>

<pre id="output"></pre>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const output = document.getElementById("output");
const countText = document.getElementById("count");

let points = [];
let colors = [];
const MAX_POINTS = 30;

// 🔥 ここで画像読み込み
const img = new Image();
img.src = "images/10a.png";

img.onload = () => {
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);
};

canvas.addEventListener("click", e => {
  if(points.length >= MAX_POINTS) return;

  const rect = canvas.getBoundingClientRect();
  const x = Math.round(e.clientX - rect.left);
  const y = Math.round(e.clientY - rect.top);

  // RGB取得
  const pixel = ctx.getImageData(x, y, 1, 1).data;
  const [r,g,b] = pixel;

  points.push([x, y]);
  colors.push([r, g, b]);

  drawPoint(x, y, points.length);
  updateUI();

  if(points.length === MAX_POINTS){
    generateOutput();
  }
});

function drawPoint(x, y, num){
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "red";
  ctx.font = "12px sans-serif";
  ctx.fillText(num, x+5, y-5);
}

function updateUI(){
  countText.textContent = `${points.length} / ${MAX_POINTS}`;
}

function generateOutput(){
  let text = "const points = [\n";
  for(const p of points){
    text += `  [${p[0]}, ${p[1]}],\n`;
  }
  text += "];\n\n";

  text += "const colors = [\n";
  for(const c of colors){
    text += `  [${c[0]}, ${c[1]}, ${c[2]}],\n`;
  }
  text += "];";

  output.textContent = text;
}

function resetPoints(){
  points = [];
  colors = [];
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img, 0, 0); // ←画像再描画
  output.textContent = "";
  countText.textContent = `0 / ${MAX_POINTS}`;
}
</script>

</body>
</html>
